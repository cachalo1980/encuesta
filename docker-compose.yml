version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: encuesta_db
    environment:
      POSTGRES_DB: encuesta_db
      POSTGRES_USER: encuesta_user
      POSTGRES_PASSWORD: encuesta_pass
    ports:
      - "5433:5432"  # host:5433 → contenedor:5432 (evita conflicto con otras DBs en WSL)
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encuesta_user -d encuesta_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: encuesta_backend
    ports:
      - "8001:8000"  # host:8001 → contenedor:8000 (evita conflicto con otras APIs en WSL)
    environment:
      DATABASE_URL: postgresql://encuesta_user:encuesta_pass@db:5432/encuesta_db
      ADMIN_PASSWORD: devmentor2024
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: encuesta_frontend
    ports:
      - "4000:4000"  # host:4000 → contenedor:4000 (Vite — 5173 y 3000 reservados en este WSL)
    environment:
      # URL del backend que usará el frontend para las llamadas de axios.
      # En local apunta al backend vía el puerto expuesto en el host.
      # En el VPS, sobreescribí este valor con la URL pública del backend
      # (ej: https://api.caruao.cloud o https://encuesta.caruao.cloud/api).
      VITE_API_URL: http://localhost:8001
    volumes:
      - ./frontend:/app          # bind-mount: cambios en el host se reflejan al instante
      - /app/node_modules        # volumen anónimo: protege node_modules del contenedor
    depends_on:
      - backend

volumes:
  db_data:
