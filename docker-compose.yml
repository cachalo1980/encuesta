version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: encuesta_db
    environment:
      POSTGRES_DB: encuesta_db
      POSTGRES_USER: encuesta_user
      POSTGRES_PASSWORD: encuesta_pass
    ports:
      - "5433:5432"  # host:5433 → contenedor:5432 (evita conflicto con otras DBs en WSL)
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encuesta_user -d encuesta_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: encuesta_backend
    ports:
      - "8001:8000"  # host:8001 → contenedor:8000 (evita conflicto con otras APIs en WSL)
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: encuesta_db
      DB_USER: encuesta_user
      DB_PASSWORD: encuesta_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
