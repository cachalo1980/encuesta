networks:
  app_net:    # Red interna compartida por todos los servicios
    driver: bridge

services:

  db:
    image: postgres:16-alpine
    container_name: encuesta_db
    networks: [app_net]
    environment:
      POSTGRES_DB:       encuesta_db
      POSTGRES_USER:     encuesta_user
      POSTGRES_PASSWORD: encuesta_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encuesta_user -d encuesta_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: encuesta_backend
    networks: [app_net]
    # Sin mapeo al host — solo Nginx puede llegar al backend
    expose: ["8000"]
    environment:
      DATABASE_URL:    postgresql://encuesta_user:encuesta_pass@db:5432/encuesta_db
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-devmentor2024}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: encuesta_frontend
    networks: [app_net]
    # Sin mapeo al host — solo Nginx puede llegar al frontend
    expose: ["4000"]
    environment:
      # Al ir todo por Nginx bajo el mismo dominio, la URL base de la API
      # es simplemente /api (sin host, sin puerto)
      VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - ./frontend:/app       # bind-mount para hot-reload en dev
      - /app/node_modules     # protege node_modules del contenedor
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: encuesta_nginx
    networks: [app_net]
    ports:
      - "80:80"               # único punto de entrada público
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
