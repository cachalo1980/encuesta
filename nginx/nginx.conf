upstream backend  { server backend:8000;  }
upstream frontend { server frontend:4000; }

server {
    listen 80;
    server_name _;     # acepta cualquier host (Cloudflare resuelve el dominio)

    # ── API: todo lo que empieza con /api/ → FastAPI ─────────────────────────
    # El frontend llamará a /api/users/, /api/questions/, etc.
    # Nginx recorta el prefijo /api antes de reenviar al backend.
    location /api/ {
        proxy_pass         http://backend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend: todo lo demás → Vite ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Necesario para Vite HMR (WebSocket de hot-reload)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
