upstream backend  { server backend:8000;  }
upstream frontend { server frontend:4000; }

server {
    listen 80;
    server_name _;

    # ── API: /api/* → FastAPI (sin el prefijo /api) ───────────────────────────
    # rewrite hace el strip de forma explícita y confiable:
    #   /api/health    →  /health
    #   /api/users/    →  /users/
    # proxy_pass sin URI al final preserva el resultado del rewrite.
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend: todo lo demás → Vite ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Necesario para Vite HMR (WebSocket de hot-reload)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
